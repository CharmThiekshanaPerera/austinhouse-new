version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: austinhouse_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      # Inject necessary environment variables automatically. Placeholders used.
      - MONGODB_URI=mongodb+srv://admin:admin123@cluster0.abcde.mongodb.net/austinhouse?retryWrites=true&w=majority
      - JWT_SECRET=docker_local_secret_string
      - ALLOWED_ORIGINS=http://localhost
    volumes:
      # Persist uploaded files across container restarts
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: austinhouse_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend_uploads:
